<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aprobación de Piezas Creativas</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f4f5f7;color:#111827;min-height:100vh}
input,textarea{font-family:inherit}
.header{background:#111827;color:#fff;padding:18px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.header h1{font-size:15px;font-weight:600;letter-spacing:.3px}
.header p{font-size:11px;color:#9ca3af;margin-top:3px}
.sync-badge{font-size:11px;display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;background:rgba(255,255,255,.1);color:#d1d5db}
.sync-badge.ok{background:rgba(74,222,128,.15);color:#4ade80}
.sync-badge.saving{background:rgba(251,191,36,.12);color:#fbbf24}
.sync-badge.err{background:rgba(239,68,68,.15);color:#f87171}
.metabar{background:#fff;border-bottom:1px solid #e5e7eb;padding:14px 24px;display:flex;gap:16px;flex-wrap:wrap;align-items:flex-end}
.mf label{display:block;font-size:10px;font-weight:600;color:#6b7280;letter-spacing:.8px;text-transform:uppercase;margin-bottom:4px}
.mf input{border:1.5px solid #e5e7eb;border-radius:8px;padding:7px 11px;font-size:13px;color:#111827;outline:none;background:#fff}
.mf input:focus{border-color:#111827}
.layout{display:grid;grid-template-columns:1fr 320px;min-height:calc(100vh - 110px)}
.left{padding:20px 24px;border-right:1px solid #e5e7eb}
.right{padding:20px 18px;background:#fff}
.sec-title{font-size:10px;font-weight:700;color:#6b7280;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.upload-zone{border:2px dashed #d1d5db;border-radius:12px;padding:36px;text-align:center;cursor:pointer;transition:.2s;background:#fafafa;color:#6b7280;display:flex;flex-direction:column;align-items:center}
.upload-zone:hover{border-color:#111827;background:#f9fafb}
.upload-zone i{font-size:32px;display:block;margin-bottom:8px;color:#9ca3af}
.upload-zone p{font-size:14px;margin-bottom:4px}
.upload-zone span{font-size:11px;color:#9ca3af}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.img-card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;overflow:hidden;position:relative;animation:fadein .25s ease}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.img-wrap{position:relative;cursor:pointer}
.img-wrap img{width:100%;height:210px;object-fit:cover;display:block}
.img-hover{position:absolute;inset:0;background:rgba(0,0,0,.42);display:flex;align-items:center;justify-content:center;opacity:0;transition:.2s}
.img-card:hover .img-hover{opacity:1}
.img-hover i{font-size:28px;color:#fff}
.img-num{position:absolute;top:8px;left:8px;background:rgba(0,0,0,.6);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px}
.replaced-tag{position:absolute;top:8px;right:8px;background:#f59e0b;color:#fff;font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600}
.card-foot{padding:10px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px;border-top:1px solid #f3f4f6}
.card-meta{flex:1;min-width:0}
.card-meta .fname{font-size:12px;color:#374151;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-meta .fmeta{font-size:11px;color:#9ca3af;margin-top:2px}
.card-actions{display:flex;gap:4px;flex-shrink:0}
.icon-btn{background:none;border:1px solid #e5e7eb;border-radius:6px;padding:5px 7px;cursor:pointer;display:flex;align-items:center;font-size:13px;color:#6b7280;transition:.15s}
.icon-btn:hover{background:#f3f4f6}
.icon-btn.danger{color:#dc2626}
.icon-btn.danger:hover{background:#fee2e2;border-color:#fecaca}
.add-more{border:2px dashed #e5e7eb;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:180px;cursor:pointer;color:#9ca3af;gap:8px;font-size:13px;transition:.2s}
.add-more:hover{border-color:#111827;color:#374151}
.reviewer-card{border:1px solid #e5e7eb;border-radius:12px;padding:14px;margin-bottom:10px;transition:.25s;background:#fafafa}
.reviewer-card.dec-aprobado{border-color:#bbf7d0;background:#f0fdf4}
.reviewer-card.dec-cambios{border-color:#fde68a;background:#fffbeb}
.reviewer-card.dec-rechazado{border-color:#fecaca;background:#fff5f5}
.rev-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;background:#e5e7eb;color:#6b7280;transition:.2s}
.avatar.dec-aprobado{background:#dcfce7;color:#16a34a}
.avatar.dec-cambios{background:#fef9c3;color:#ca8a04}
.avatar.dec-rechazado{background:#fee2e2;color:#dc2626}
.rev-name-input{border:none;border-bottom:1px solid #e5e7eb;padding:3px 0;font-size:13px;color:#111827;width:100%;outline:none;background:transparent}
.rev-name-input:focus{border-bottom-color:#111827}
.status-pill{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;flex-shrink:0;background:#f3f4f6;color:#6b7280}
.status-pill.aprobado{background:#dcfce7;color:#16a34a}
.status-pill.cambios{background:#fef9c3;color:#ca8a04}
.status-pill.rechazado{background:#fee2e2;color:#dc2626}
.dec-btns{display:flex;gap:6px;margin-bottom:10px}
.dec-btn{flex:1;padding:7px 4px;border-radius:8px;border:1.5px solid #e5e7eb;background:#fff;font-size:11px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;transition:.15s;color:#6b7280}
.dec-btn:hover{background:#f9fafb}
.dec-btn.active-aprobado{background:#dcfce7;border-color:#86efac;color:#16a34a}
.dec-btn.active-cambios{background:#fef9c3;border-color:#fde047;color:#ca8a04}
.dec-btn.active-rechazado{background:#fee2e2;border-color:#fca5a5;color:#dc2626}
.comment-ta{width:100%;border:1px solid #e5e7eb;border-radius:8px;padding:7px 10px;font-size:12px;font-family:inherit;resize:vertical;min-height:52px;outline:none;color:#374151;background:#fff}
.comment-ta:focus{border-color:#111827}
.summary{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.s-pill{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600}
.footer-btns{display:flex;gap:8px;margin-top:14px}
.footer-btns button{flex:1;padding:9px;border-radius:8px;border:1px solid #e5e7eb;background:#fff;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;color:#374151;font-weight:500;transition:.15s}
.footer-btns button:hover{background:#f3f4f6}
.footer-btns button.danger{color:#dc2626}
.footer-btns button.danger:hover{background:#fee2e2;border-color:#fecaca}
.last-upd{font-size:10px;color:#9ca3af;text-align:center;margin-top:10px}
.lb-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;z-index:9999}
.lb-inner{max-width:88vw;max-height:88vh;display:flex;flex-direction:column;align-items:center;gap:10px}
.lb-inner img{max-width:100%;max-height:80vh;object-fit:contain;border-radius:8px}
.lb-info{color:#d1d5db;font-size:12px;text-align:center}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.15);border:none;color:#fff;font-size:22px;width:44px;height:44px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
.lb-nav:hover{background:rgba(255,255,255,.28)}
.lb-close{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:16px;width:36px;height:36px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}
.loading-screen{position:fixed;inset:0;background:#111827;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;color:#fff;gap:16px}
.loading-screen p{font-size:14px;color:#9ca3af}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.spin{animation:spin 1s linear infinite}
@media(max-width:700px){
  .layout{grid-template-columns:1fr}
  .right{border-top:1px solid #e5e7eb}
  .grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}
}
@media print{
  .header .sync-badge{display:none}
  .upload-zone{display:none}
  .card-actions{display:none}
  .footer-btns{display:none}
  .add-more{display:none}
}
</style>
</head>
<body>

<!-- Loading screen -->
<div class="loading-screen" id="loading-screen">
  <i class="ti ti-loader spin" style="font-size:36px;color:#6366f1"></i>
  <p>Cargando datos...</p>
</div>

<div id="app" style="display:none">

<div class="header">
  <div>
    <h1>APROBACIÓN DE PIEZAS CREATIVAS</h1>
    <p>Cambios en tiempo real — todos ven lo mismo</p>
  </div>
  <div id="sync-badge" class="sync-badge"><i class="ti ti-cloud"></i> <span id="sync-text">Conectando...</span></div>
</div>

<div class="metabar">
  <div class="mf"><label>Cliente</label><input id="cliente" placeholder="Ej: Fajas Romanza" oninput="debounceSave()" style="width:200px"></div>
  <div class="mf"><label>Número de orden</label><input id="orden" placeholder="Ej: ORD-2025-047" oninput="debounceSave()" style="width:180px"></div>
</div>

<div class="layout">
  <div class="left" id="drop-zone">
    <div class="sec-title">
      <span>IMÁGENES <span id="img-count" style="color:#374151">0</span></span>
      <button onclick="document.getElementById('fileInput').click()" style="background:#111827;color:#fff;border:none;border-radius:7px;padding:5px 12px;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:inherit"><i class="ti ti-upload" style="font-size:13px"></i> Subir imágenes</button>
    </div>
    <div id="upload-zone" class="upload-zone" onclick="document.getElementById('fileInput').click()">
      <i class="ti ti-photo-up"></i>
      <p>Haz clic o arrastra imágenes aquí</p>
      <span>PNG, JPG, WEBP — sin límite de cantidad</span>
    </div>
    <div class="grid" id="img-grid" style="display:none"></div>
    <input type="file" id="fileInput" multiple accept="image/*" style="display:none" onchange="handleFiles(this.files)">
    <input type="file" id="replaceInput" accept="image/*" style="display:none" onchange="handleReplace(this.files[0])">
  </div>

  <div class="right">
    <div class="sec-title">APROBACIONES</div>
    <div class="summary">
      <span class="s-pill" style="background:#dcfce7;color:#16a34a"><span id="cnt-ap">0</span> Aprobados</span>
      <span class="s-pill" style="background:#fef9c3;color:#ca8a04"><span id="cnt-cam">0</span> Con cambios</span>
      <span class="s-pill" style="background:#fee2e2;color:#dc2626"><span id="cnt-re">0</span> Rechazados</span>
      <span class="s-pill" style="background:#f3f4f6;color:#6b7280"><span id="cnt-pen">3</span> Pendientes</span>
    </div>
    <div id="reviewers-container"></div>
    <div class="footer-btns">
      <button onclick="window.print()"><i class="ti ti-printer" style="font-size:15px"></i> Imprimir / PDF</button>
      <button class="danger" onclick="clearAll()" title="Limpiar todo"><i class="ti ti-trash" style="font-size:15px"></i></button>
    </div>
    <div class="last-upd" id="last-upd"></div>
  </div>
</div>

</div><!-- /app -->

<!-- Lightbox -->
<div id="lightbox" class="lb-overlay" style="display:none" onclick="closeLb()">
  <button class="lb-nav" style="left:16px" onclick="event.stopPropagation();navLb(-1)">&#8249;</button>
  <div class="lb-inner" onclick="event.stopPropagation()">
    <img id="lb-img" src="" alt="">
    <div class="lb-info" id="lb-info"></div>
    <div style="color:rgba(255,255,255,.45);font-size:11px" id="lb-counter"></div>
  </div>
  <button class="lb-nav" style="right:16px" onclick="event.stopPropagation();navLb(1)">&#8250;</button>
  <button class="lb-close" onclick="closeLb()">✕</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCXWi51uBJXsQsz2F8IDOWpbl72JiMz__g",
  authDomain: "aprobaciones-f919a.firebaseapp.com",
  projectId: "aprobaciones-f919a",
  storageBucket: "aprobaciones-f919a.firebasestorage.app",
  messagingSenderId: "121589180467",
  appId: "1:121589180467:web:50b23e61156996023f5b46",
  measurementId: "G-HEBKL3WEW6"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const DOC_REF = doc(db, "aprobaciones", "principal");

let state = {
  cliente: "", orden: "",
  images: [],
  reviewers: [
    {id:1,name:"",decision:null,comment:""},
    {id:2,name:"",decision:null,comment:""},
    {id:3,name:"",decision:null,comment:""}
  ],
  lastUpdated: null
};

let replaceTargetId = null;
let lbIdx = 0;
let saveTimer = null;
let isLocalUpdate = false;

// ---- FIREBASE LISTENER (tiempo real) ----
onSnapshot(DOC_REF, (snap) => {
  if (isLocalUpdate) return;
  if (snap.exists()) {
    state = snap.data();
    renderAll();
  }
  document.getElementById("loading-screen").style.display = "none";
  document.getElementById("app").style.display = "block";
  setSyncBadge("ok", "En vivo ✓");
}, (err) => {
  console.error(err);
  document.getElementById("loading-screen").style.display = "none";
  document.getElementById("app").style.display = "block";
  setSyncBadge("err", "Sin conexión");
});

// ---- GUARDAR ----
async function saveState() {
  setSyncBadge("saving", "Guardando...");
  state.lastUpdated = new Date().toISOString();
  isLocalUpdate = true;
  try {
    await setDoc(DOC_REF, state);
    setSyncBadge("ok", "Guardado ✓");
    renderLastUpd();
  } catch(e) {
    setSyncBadge("err", "Error al guardar");
    console.error(e);
  }
  setTimeout(() => { isLocalUpdate = false; }, 1000);
}

window.debounceSave = function() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => { syncMeta(); saveState(); }, 600);
};

function syncMeta() {
  state.cliente = document.getElementById("cliente").value;
  state.orden = document.getElementById("orden").value;
}

function setSyncBadge(type, text) {
  const b = document.getElementById("sync-badge");
  const icon = type === "saving"
    ? '<i class="ti ti-loader spin" style="font-size:13px"></i>'
    : type === "err"
    ? '<i class="ti ti-cloud-off" style="font-size:13px"></i>'
    : '<i class="ti ti-cloud-check" style="font-size:13px"></i>';
  b.className = "sync-badge" + (type==="ok"?" ok":type==="saving"?" saving":type==="err"?" err":"");
  b.innerHTML = icon + " <span>" + text + "</span>";
}

// ---- RENDER ----
function renderAll() {
  document.getElementById("cliente").value = state.cliente || "";
  document.getElementById("orden").value = state.orden || "";
  renderImages();
  renderReviewers();
  renderLastUpd();
}

function renderImages() {
  const zone = document.getElementById("upload-zone");
  const grid = document.getElementById("img-grid");
  const count = (state.images || []).length;
  document.getElementById("img-count").textContent = count;
  if (count === 0) { zone.style.display = "flex"; grid.style.display = "none"; return; }
  zone.style.display = "none"; grid.style.display = "grid";
  grid.innerHTML = "";
  state.images.forEach((img, i) => {
    const card = document.createElement("div");
    card.className = "img-card";
    const meta = [];
    if (state.cliente) meta.push(state.cliente);
    if (state.orden) meta.push(state.orden);
    card.innerHTML = `
      <div class="img-wrap" onclick="openLb(${i})">
        <img src="${img.src}" alt="${img.name}" loading="lazy">
        <div class="img-hover"><i class="ti ti-zoom-in"></i></div>
        <span class="img-num">#${i+1}</span>
        ${img.replaced ? '<span class="replaced-tag">Reemplazada</span>' : ""}
      </div>
      <div class="card-foot">
        <div class="card-meta">
          <div class="fname">${img.name}</div>
          ${meta.length ? `<div class="fmeta">${meta.join(" · ")}</div>` : ""}
        </div>
        <div class="card-actions">
          <button class="icon-btn" title="Reemplazar" onclick="triggerReplace('${img.id}')"><i class="ti ti-replace"></i></button>
          <button class="icon-btn danger" title="Eliminar" onclick="removeImg('${img.id}')"><i class="ti ti-trash"></i></button>
        </div>
      </div>`;
    grid.appendChild(card);
  });
  const add = document.createElement("div");
  add.className = "add-more";
  add.onclick = () => document.getElementById("fileInput").click();
  add.innerHTML = '<i class="ti ti-plus" style="font-size:24px"></i><span>Agregar más</span>';
  grid.appendChild(add);
}

function renderReviewers() {
  const c = document.getElementById("reviewers-container");
  c.innerHTML = "";
  let ap=0, cam=0, re=0, pen=0;
  (state.reviewers || []).forEach(r => {
    if (r.decision==="aprobado") ap++;
    else if (r.decision==="cambios") cam++;
    else if (r.decision==="rechazado") re++;
    else pen++;
    const initials = r.name.trim()
      ? r.name.trim().split(" ").map(w=>w[0]).join("").substring(0,2).toUpperCase()
      : r.id;
    const decClass = r.decision ? "dec-"+r.decision : "";
    const div = document.createElement("div");
    div.className = "reviewer-card " + decClass;
    div.innerHTML = `
      <div class="rev-head">
        <div class="avatar ${decClass}" id="av-${r.id}">${initials}</div>
        <input class="rev-name-input" placeholder="Nombre del revisor..." value="${r.name||""}" oninput="setRevName(${r.id},this.value)">
        <span class="status-pill ${r.decision||""}">${r.decision ? (r.decision==="aprobado"?"Aprobado":r.decision==="cambios"?"Con cambios":"Rechazado") : "Pendiente"}</span>
      </div>
      <div class="dec-btns">
        <button class="dec-btn ${r.decision==="aprobado"?"active-aprobado":""}" onclick="setDec(${r.id},'aprobado')"><i class="ti ti-circle-check" style="font-size:13px"></i> Aprobado</button>
        <button class="dec-btn ${r.decision==="cambios"?"active-cambios":""}" onclick="setDec(${r.id},'cambios')"><i class="ti ti-refresh" style="font-size:13px"></i> Con cambios</button>
        <button class="dec-btn ${r.decision==="rechazado"?"active-rechazado":""}" onclick="setDec(${r.id},'rechazado')"><i class="ti ti-circle-x" style="font-size:13px"></i> Rechazado</button>
      </div>
      <textarea class="comment-ta" placeholder="Observaciones (opcional)..." oninput="setRevComment(${r.id},this.value)">${r.comment||""}</textarea>`;
    c.appendChild(div);
  });
  document.getElementById("cnt-ap").textContent = ap;
  document.getElementById("cnt-cam").textContent = cam;
  document.getElementById("cnt-re").textContent = re;
  document.getElementById("cnt-pen").textContent = pen;
}

function renderLastUpd() {
  if (state.lastUpdated) {
    document.getElementById("last-upd").textContent =
      "Última actualización: " + new Date(state.lastUpdated).toLocaleString("es-CO");
  }
}

// ---- IMÁGENES ----
window.handleFiles = function(files) {
  const arr = Array.from(files);
  let done = 0;
  arr.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      if (!state.images) state.images = [];
      state.images.push({id: Date.now()+"_"+Math.random(), src: e.target.result, name: file.name, replaced: false});
      done++;
      if (done === arr.length) { renderImages(); saveState(); }
    };
    reader.readAsDataURL(file);
  });
  document.getElementById("fileInput").value = "";
};

window.removeImg = function(id) {
  state.images = state.images.filter(i => i.id !== id);
  renderImages(); saveState();
};

window.triggerReplace = function(id) {
  replaceTargetId = id;
  document.getElementById("replaceInput").click();
};

window.handleReplace = function(file) {
  if (!file || !replaceTargetId) return;
  const reader = new FileReader();
  reader.onload = e => {
    const idx = state.images.findIndex(i => i.id === replaceTargetId);
    if (idx > -1) {
      state.images[idx] = {...state.images[idx], src: e.target.result, name: file.name, replaced: true};
    }
    renderImages(); saveState(); replaceTargetId = null;
  };
  reader.readAsDataURL(file);
  document.getElementById("replaceInput").value = "";
};

// Drag & drop
const dropZone = document.getElementById("drop-zone");
dropZone.addEventListener("dragover", e => { e.preventDefault(); document.getElementById("upload-zone").style.borderColor = "#111827"; });
dropZone.addEventListener("dragleave", () => { document.getElementById("upload-zone").style.borderColor = ""; });
dropZone.addEventListener("drop", e => { e.preventDefault(); document.getElementById("upload-zone").style.borderColor = ""; window.handleFiles(e.dataTransfer.files); });

// ---- REVISORES ----
window.setRevName = function(id, val) {
  const r = state.reviewers.find(r => r.id === id);
  if (r) r.name = val;
  const initials = val.trim() ? val.trim().split(" ").map(w=>w[0]).join("").substring(0,2).toUpperCase() : id;
  const av = document.getElementById("av-"+id);
  if (av) av.textContent = initials;
  window.debounceSave();
};

window.setRevComment = function(id, val) {
  const r = state.reviewers.find(r => r.id === id);
  if (r) r.comment = val;
  window.debounceSave();
};

window.setDec = function(id, dec) {
  const r = state.reviewers.find(r => r.id === id);
  if (!r) return;
  r.decision = r.decision === dec ? null : dec;
  renderReviewers();
  saveState();
};

// ---- LIGHTBOX ----
window.openLb = function(idx) { lbIdx = idx; showLb(); };
function showLb() {
  const img = state.images[lbIdx];
  if (!img) return;
  document.getElementById("lb-img").src = img.src;
  const meta = [img.name];
  if (state.cliente) meta.push(state.cliente);
  if (state.orden) meta.push(state.orden);
  document.getElementById("lb-info").textContent = meta.join(" · ");
  document.getElementById("lb-counter").textContent = (lbIdx+1) + " / " + state.images.length;
  document.getElementById("lightbox").style.display = "flex";
}
window.closeLb = function() { document.getElementById("lightbox").style.display = "none"; };
window.navLb = function(dir) { lbIdx = (lbIdx + dir + state.images.length) % state.images.length; showLb(); };
document.addEventListener("keydown", e => {
  if (document.getElementById("lightbox").style.display === "flex") {
    if (e.key === "ArrowLeft") window.navLb(-1);
    if (e.key === "ArrowRight") window.navLb(1);
    if (e.key === "Escape") window.closeLb();
  }
});

// ---- LIMPIAR ----
window.clearAll = function() {
  if (!confirm("¿Limpiar todo? Esta acción no se puede deshacer.")) return;
  state = {
    cliente: "", orden: "", images: [],
    reviewers: [{id:1,name:"",decision:null,comment:""},{id:2,name:"",decision:null,comment:""},{id:3,name:"",decision:null,comment:""}],
    lastUpdated: null
  };
  renderAll(); saveState();
};

</script>
</body>
